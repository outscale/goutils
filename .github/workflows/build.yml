name: Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "*/go.*"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: 🔎 Reuse check
      run: |
        docker run --rm --volume $PWD:/data fsfe/reuse:5.1 lint
  sdk:
    runs-on: [self-hosted, linux]
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: ⬇️ Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'
    - name:
      run: echo "replace github.com/outscale/goutils/sdk => ../sdk" >> k8s/go.mod
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint # v9
      with:
        working-directory: sdk
    - name: 🧪 Unit tests
      run: cd sdk && go test ./...
  k8s:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: ⬇️ Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint # v9
      with:
        working-directory: k8s
    - name: 🧪 Unit tests
      run: cd k8s && go test ./...
  oks:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: ⬇️ Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint # v9
      with:
        working-directory: oks
