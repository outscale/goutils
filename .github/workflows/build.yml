name: Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "*/go.*"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: 🔎 Reuse check
      run: |
        docker run --rm --volume $PWD:/data fsfe/reuse:5.1 lint
  sdk:
    runs-on: [self-hosted, linux]
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: ⬇️ Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: '1.26'
    - name: 🔧 Update go.mod for testing
      run: echo "replace github.com/outscale/goutils/sdk => ../sdk" >> k8s/go.mod
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint
      with:
        working-directory: sdk
    - name: 🧪 Unit tests
      run: cd sdk && go test ./...
  k8s:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: ⬇️ Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: '1.26'
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint
      with:
        working-directory: k8s
    - name: 🧪 Unit tests
      run: cd k8s && go test ./...
  oks:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: ⬇️ Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: '1.26'
    - name: 🔎 golangci-lint
      uses: ./.github/actions/lint
      with:
        working-directory: oks
